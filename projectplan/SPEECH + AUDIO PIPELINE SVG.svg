<svg width="1000" height="300" xmlns="http://www.w3.org/2000/svg">

<style>
.box { fill:#1e1b4b; stroke:#a78bfa; stroke-width:2; rx:10; }
.text { fill:white; font-size:12px; text-anchor:middle; font-family:Arial; }
.arrow { stroke:#94a3b8; stroke-width:2; marker-end:url(#arrow); }
</style>

<defs>
<marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
<polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
</marker>
</defs>

<rect x="50" y="120" width="150" height="60" class="box"/>
<text x="125" y="150" class="text">Raw Audio</text>

<rect x="250" y="120" width="180" height="60" class="box"/>
<text x="340" y="145" class="text">Preprocessing</text>
<text x="340" y="165" class="text">(Trim + Normalize)</text>

<rect x="470" y="120" width="220" height="60" class="box"/>
<text x="580" y="145" class="text">Feature Extraction</text>
<text x="580" y="165" class="text">MFCC, Pitch, Pauses</text>

<rect x="740" y="120" width="200" height="60" class="box"/>
<text x="840" y="150" class="text">ML Model</text>

<line x1="200" y1="150" x2="250" y2="150" class="arrow"/>
<line x1="430" y1="150" x2="470" y2="150" class="arrow"/>
<line x1="690" y1="150" x2="740" y2="150" class="arrow"/>

</svg>